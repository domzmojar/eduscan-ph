<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline QR Attendance Tracker</title>
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f5f7fb;
            color: #333;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
        }
        /* Style the scanner box container */
        #reader {
            background: #ffffff;
            border: 2px solid #e2e8f0 !important;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        /* Adjust library generated buttons to look modern */
        #reader button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px 0;
        }
        #reader button:hover {
            background-color: #1d4ed8;
        }
        .alert-box {
            margin-top: 20px;
            padding: 15px;
            background: #dbeafe;
            border-left: 4px solid #2563eb;
            border-radius: 4px;
            display: none;
        }
        .log-section {
            margin-top: 25px;
        }
        .log-list {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
        }
        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 5px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }
        .log-item:last-child {
            border-bottom: none;
        }
        .status-badge {
            background: #fee2e2;
            color: #991b1b;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Attendance Scanner</h2>
    <p class="subtitle">Remote Mode: Scans are saved safely on your device.</p>
    
    <div id="reader"></div>

    <div id="alert-box" class="alert-box">
        <strong>Scanned Successfully!</strong><br>
        Student ID: <span id="scanned-id">---</span>
    </div>

    <div class="log-section">
        <h3>Unsynced Local Storage Logs (<span id="queue-count">0</span>)</h3>
        <div id="log-list" class="log-list">
            <div style="color: #94a3b8; text-align: center; padding: 20px;">No offline scans on this device yet.</div>
        </div>
    </div>
</div>

<script>
    // Initialize state from device memory or setup empty array if new
    let offlineQueue = JSON.parse(localStorage.getItem('attendanceQueue')) || [];

    // Render historical logs if they exist from past sessions
    renderLogs();

    function onScanSuccess(decodedText, decodedResult) {
        // 1. Prevent accidental duplicate immediate double-scans of the same student
        if (isRecentDuplicate(decodedText)) {
            return; 
        }

        // 2. Play subtle haptic vibrate feedback if device allows
        if (navigator.vibrate) navigator.vibrate(100);

        // 3. Document visual feedback on layout UI
        document.getElementById('scanned-id').innerText = decodedText;
        document.getElementById('alert-box').style.display = 'block';

        // 4. Construct data entry layout matching Google Sheets logic requirements
        const checkInRecord = {
            studentId: decodedText,
            timestamp: new Date().toLocaleString(),
            status: "Pending Sync"
        };

        // 5. Commit record straight into hard drive space allocation of browser engine
        offlineQueue.push(checkInRecord);
        localStorage.setItem('attendanceQueue', JSON.stringify(offlineQueue));

        // 6. Refresh UI components instantly
        renderLogs();
    }

    function isRecentDuplicate(id) {
        if (offlineQueue.length === 0) return false;
        const lastRecord = offlineQueue[offlineQueue.length - 1];
        
        // Block scanning the identical person twice if within a tight 4-second timeframe
        const timeElapsed = new Date() - new Date(lastRecord.timestamp);
        return lastRecord.studentId === id && timeElapsed < 4000;
    }

    function renderLogs() {
        const logContainer = document.getElementById('log-list');
        document.getElementById('queue-count').innerText = offlineQueue.length;

        if (offlineQueue.length === 0) {
            logContainer.innerHTML = `<div style="color: #94a3b8; text-align: center; padding: 20px;">No offline scans on this device yet.</div>`;
            return;
        }

        // Display newest scans at the top of the stack list tracking feedback
        const htmlLogs = offlineQueue.map(item => `
            <div class="log-item">
                <div>
                    <strong>${item.studentId}</strong> <br>
                    <small style="color: #64748b;">${item.timestamp}</small>
                </div>
                <div>
                    <span class="status-badge">${item.status}</span>
                </div>
            </div>
        `).reverse().join('');

        logContainer.innerHTML = htmlLogs;
    }

    // Initialize modern HTML5 Scanner instance configuration layout properties
    const scannerConfig = { 
        fps: 15, // Scan frames calculation performance speed rate
        qrbox: { width: 250, height: 250 }, // Square capture target focus window setup
        rememberLastUsedCamera: true, // remebers back camera vs front camera options selection
        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA] // enforces native lens tracking options directly
    };

    const html5QrcodeScanner = new Html5QrcodeScanner("reader", scannerConfig, /* verbose= */ false);
    html5QrcodeScanner.render(onScanSuccess);
</script>
</body>
</html>
